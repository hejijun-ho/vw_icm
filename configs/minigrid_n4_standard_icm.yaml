env: MiniGrid-MultiRoom-N4-S5-v1
action_space: discrete
total_steps: 5000000
max_steps: 2000
seed: 42

encoder:
  type: auto
  feature_dim: 256

icm:
  type: standard
  intrinsic_coeff: 0.01
  normalize_intrinsic: true
  intrinsic_decay_start: 0.8
  forward_loss_coeff: 0.2
  inverse_loss_coeff: 0.8

ppo:
  lr: 2.5e-4
  n_steps: 256
  n_epochs: 4
  batch_size: 256
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  vf_coeff: 0.5
  ent_coeff: 0.01

logging:
  log_dir: runs/n4_standard_icm
  save_freq: 500000
  log_freq: 20
